<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI日报生成器</title>
  <style>
    body { max-width: 800px; margin: 40px auto; padding: 20px; font-family: Arial }
    #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; }
    #loading { color: #007bff; margin-top: 10px; }
    button { padding: 8px 16px; margin-right: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>AI日报生成器</h1>
  
  <input type="text" id="topic" value="AI行业趋势" placeholder="请输入主题">
  <select id="style">
    <option value="invest">投资版</option>
    <option value="normal">标准版</option>
    <option value="simple">简易版</option>
  </select>

  <button onclick="generate()">生成报告</button>
  <button onclick="loadHistory()">历史记录</button>

  <div id="loading" style="display:none">生成中，请稍候...</div>
  <div id="result"></div>
  <div id="history" style="margin-top:20px"></div>

  <script>
    const resultDiv = document.getElementById('result');
    const loading = document.getElementById('loading');
    const historyDiv = document.getElementById('history');

    async function generate() {
      const topic = document.getElementById('topic').value;
      const style = document.getElementById('style').value;

      loading.style.display = "block";
      resultDiv.innerText = "";

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, style })
        });

        const data = await res.json();
        loading.style.display = "none";

        // ✅ 修复：直接显示后端返回的完整文本
        if (data.data?.content?.raw) {
          resultDiv.innerText = data.data.content.raw;
        } else {
          resultDiv.innerText = "✅ 生成完成，但未找到内容";
        }
      } catch (err) {
        loading.style.display = "none";
        resultDiv.innerText = "❌ 错误：" + err.toString();
      }
    }

    async function loadHistory() {
      const res = await fetch('/api/history');
      const data = await res.json();
      historyDiv.innerHTML = "<h3>历史记录</h3>" + data.data.map(i =>
        `<div onclick='renderHistory(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
          ${i.topic} (${i.style})
        </div>`
      ).join('');
    }

    function renderHistory(item) {
      resultDiv.innerText = item.content?.raw || "无内容";
    }
  </script>
</body>
</html>
