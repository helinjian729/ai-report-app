<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI日报生成器</title>
  <style>
    body { max-width: 800px; margin: 40px auto; font-family: Arial; }
    button { margin: 5px; padding: 8px; }
    #result, #history { margin-top: 20px; background: #f5f5f5; padding: 15px; }
  </style>
</head>

<body>

<h2>🚀 AI日报生成器</h2>

<input id="topic" placeholder="输入主题" size="40" value="AI行业趋势"/>

<select id="style">
  <option value="pro">专业版</option>
  <option value="simple">小白版</option>
  <option value="invest">投资版</option>
</select>

<button onclick="generate()">生成</button>
<button onclick="loadHistory()">历史</button>

<p id="loading" style="display:none;">生成中...</p>

<div id="result"></div>
<div id="history"></div>

<script>
async function generate() {
  const topic = document.getElementById('topic').value;
  const style = document.getElementById('style').value;

  const loading = document.getElementById('loading');
  const resultDiv = document.getElementById('result');

  loading.style.display = "block";
  resultDiv.innerHTML = "";

  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, style })
  });

  const data = await res.json();
  loading.style.display = "none";

  if (data.error) {
    resultDiv.innerHTML = "❌ " + data.error;
    return;
  }

  render(data.data);
}

function render(item) {
  const c = item.content;

  let html = `<h3>${c.title || "日报"}</h3>`;

  if (c.summary) {
    html += "<b>摘要：</b><ul>" + c.summary.map(i => `<li>${i}</li>`).join('') + "</ul>";
  }

  if (c.points) {
    html += "<b>核心观点：</b><ul>" + c.points.map(i => `<li>${i}</li>`).join('') + "</ul>";
  }

  html += `<p><b>趋势：</b>${c.trend || ""}</p>`;
  html += `<p><b>总结：</b>${c.conclusion || ""}</p>`;

  document.getElementById('result').innerHTML = html;
}

async function loadHistory() {
  const res = await fetch('/api/history');
  const data = await res.json();

  const historyDiv = document.getElementById('history');

  historyDiv.innerHTML = data.data.map(item => `
    <div onclick='render(${JSON.stringify(item).replace(/'/g, "&apos;")})'
         style="cursor:pointer;margin-bottom:10px;border-bottom:1px solid #ccc">
      <b>${item.topic}</b> (${item.style})
    </div>
  `).join('');
}
</script>

</body>
</html>
